name: Deploy PR Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: pr-env-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy PR Environment
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ steps.frontend-url.outputs.url }}
    env:
      ENV_NAME: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('infra/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Bootstrap CDK
        working-directory: infra
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }}

      - name: Deploy database and backend
        id: deploy-backend
        working-directory: infra
        run: |
          cdk deploy \
            "CashlyticsDatabase-${ENV_NAME}" "CashlyticsBackend-${ENV_NAME}" \
            --require-approval never \
            -c environment=${ENV_NAME} \
            --outputs-file cdk-backend-outputs.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          with open("cdk-backend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get(f"CashlyticsBackend-{os.environ['ENV_NAME']}", {})
          print(f"backend_url={stack['BackendUrl'].rstrip('/')}")
          print(f"user_pool_id={stack['UserPoolId']}")
          print(f"user_pool_client_id={stack['UserPoolClientId']}")
          PY

      # PR environments use a well-known password so reviewers can log in
      # (the issue asks for easy dev credentials). Non-prod pools only.
      - name: Set dev admin passwords
        run: |
          for USER in admin@cashlytics.dev admin2@cashlytics.dev; do
            aws cognito-idp admin-set-user-password \
              --user-pool-id "${{ steps.deploy-backend.outputs.user_pool_id }}" \
              --username "$USER" \
              --password "password" \
              --permanent
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (OpenNext)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.deploy-backend.outputs.backend_url }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.deploy-backend.outputs.user_pool_client_id }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ secrets.AWS_REGION }}
        run: npx open-next@latest build

      - name: Verify OpenNext output
        working-directory: frontend
        run: |
          if [ ! -d ".open-next/server-functions/default" ]; then
            echo "ERROR: OpenNext did not produce .open-next/server-functions/default/"
            echo "Contents of .open-next/ (if it exists):"
            ls -la .open-next/ 2>/dev/null || echo "  .open-next/ does not exist"
            exit 1
          fi
          echo "OpenNext output OK: $(du -sh .open-next/server-functions/default | cut -f1) in server-functions/default/"

      - name: Deploy frontend
        id: deploy-frontend
        working-directory: infra
        run: |
          rm -rf cdk.out
          cdk deploy \
            "CashlyticsFrontend-${ENV_NAME}" \
            --require-approval never \
            -c environment=${ENV_NAME} \
            --outputs-file cdk-frontend-outputs.json

      - name: Extract frontend URL
        id: frontend-url
        working-directory: infra
        run: |
          FRONTEND_URL=$(python3 - <<'PY'
          import json, os
          with open("cdk-frontend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get(f"CashlyticsFrontend-{os.environ['ENV_NAME']}", {})
          url = next((v for v in stack.values() if v.startswith("https://")), "")
          print(url.rstrip("/"))
          PY
          )
          echo "url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR with deployment URLs
        uses: actions/github-script@v9
        with:
          script: |
            const backendUrl  = '${{ steps.deploy-backend.outputs.backend_url }}';
            const frontendUrl = '${{ steps.frontend-url.outputs.url }}';
            const envName     = 'pr-${{ github.event.pull_request.number }}';
            const sha         = context.sha.slice(0, 7);

            const body = [
              '## Deploy: PR environment ready',
              '',
              `Environment: \`${envName}\``,
              '',
              '| Service | URL |',
              '|---------|-----|',
              `| Frontend | ${frontendUrl} |`,
              `| Backend API | ${backendUrl} |`,
              '',
              'Login: `admin@cashlytics.dev` / `password`',
              '',
              `Deployed from commit \`${sha}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Deploy: PR environment ready'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }