name: Deploy to Development

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  deploy:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ steps.frontend-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('infra/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Bootstrap CDK
        working-directory: infra
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }}

      - name: Deploy database and backend
        id: deploy-backend
        working-directory: infra
        run: |
          cdk deploy \
            "CashlyticsDatabase-dev" "CashlyticsBackend-dev" \
            --require-approval never \
            -c environment=dev \
            --outputs-file cdk-backend-outputs.json

          BACKEND_URL=$(python3 - <<'PY'
          import json, sys
          with open("cdk-backend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get("CashlyticsBackend-dev", {})
          url = next((v for v in stack.values() if v.startswith("https://")), "")
          print(url.rstrip("/"))
          PY
          )
          echo "backend_url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (OpenNext)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.deploy-backend.outputs.backend_url }}
        run: npx open-next@latest build

      - name: Deploy frontend
        id: deploy-frontend
        working-directory: infra
        run: |
          cdk deploy \
            "CashlyticsFrontend-dev" \
            --require-approval never \
            -c environment=dev \
            --outputs-file cdk-frontend-outputs.json

      - name: Extract frontend URL
        id: frontend-url
        working-directory: infra
        run: |
          FRONTEND_URL=$(python3 - <<'PY'
          import json
          with open("cdk-frontend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get("CashlyticsFrontend-dev", {})
          url = next((v for v in stack.values() if v.startswith("https://")), "")
          print(url.rstrip("/"))
          PY
          )
          echo "url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR with deployment URLs
        uses: actions/github-script@v7
        with:
          script: |
            const backendUrl  = '${{ steps.deploy-backend.outputs.backend_url }}';
            const frontendUrl = '${{ steps.frontend-url.outputs.url }}';
            const sha         = context.sha.slice(0, 7);

            const body = [
              '## Deploy: Dev deployment ready',
              '',
              '| Service | URL |',
              '|---------|-----|',
              `| Frontend | ${frontendUrl} |`,
              `| Backend API | ${backendUrl} |`,
              '',
              `Deployed from commit \`${sha}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Deploy: Dev deployment ready'),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }