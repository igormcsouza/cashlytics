name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

# Only one production environment, so there's exactly one group: rapid pushes
# to main queue behind each other instead of racing concurrent `cdk deploy`
# calls against the same CashlyticsBackend-prod stack. An in-flight deploy is
# never cancelled — killing one mid-update can leave the stack rolled back or
# stuck, and a half-applied admin user is exactly what caused this in the
# first place (see git history around 2026-07-17 for the incident).
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  e2e:
    name: E2E (smoke + full)
    needs: ci
    uses: ./.github/workflows/e2e.yml
    with:
      full: true

  deploy:
    name: Deploy Production
    needs: e2e
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.frontend-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('infra/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python dependencies
        working-directory: infra
        run: pip install -r requirements.txt

      - name: Bootstrap CDK
        working-directory: infra
        run: |
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }}

      - name: Deploy database and backend
        id: deploy-backend
        working-directory: infra
        env:
          # Repo variable overrides the default admin users without a commit.
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS || 'igormcsouza@gmail.com,eilawoman@hotmail.com' }}
        run: |
          # --exclusively: FrontendStack references backend.http_api.url, so
          # without this flag `cdk deploy CashlyticsFrontend-prod` below would
          # implicitly redeploy this stack too — with no -c admin_emails,
          # flipping prod's real admin users back to the dev placeholders on
          # every push (see git history around 2026-07-17).
          cdk deploy \
            "CashlyticsDatabase-prod" "CashlyticsBackend-prod" \
            --exclusively \
            --require-approval never \
            -c environment=prod \
            -c admin_emails="${ADMIN_EMAILS}" \
            --outputs-file cdk-backend-outputs.json

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open("cdk-backend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get("CashlyticsBackend-prod", {})
          print(f"backend_url={stack['BackendUrl'].rstrip('/')}")
          print(f"user_pool_client_id={stack['UserPoolClientId']}")
          PY

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (OpenNext)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.deploy-backend.outputs.backend_url }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ steps.deploy-backend.outputs.user_pool_client_id }}
          NEXT_PUBLIC_COGNITO_REGION: ${{ secrets.AWS_REGION }}
        run: npx open-next@latest build

      - name: Verify OpenNext output
        working-directory: frontend
        run: |
          if [ ! -d ".open-next/server-functions/default" ]; then
            echo "ERROR: OpenNext did not produce .open-next/server-functions/default/"
            echo "Contents of .open-next/ (if it exists):"
            ls -la .open-next/ 2>/dev/null || echo "  .open-next/ does not exist"
            exit 1
          fi
          echo "OpenNext output OK: $(du -sh .open-next/server-functions/default | cut -f1) in server-functions/default/"

      - name: Deploy frontend
        working-directory: infra
        run: |
          rm -rf cdk.out
          cdk deploy \
            "CashlyticsFrontend-prod" \
            --exclusively \
            --require-approval never \
            -c environment=prod \
            --outputs-file cdk-frontend-outputs.json

      - name: Extract frontend URL
        id: frontend-url
        working-directory: infra
        run: |
          FRONTEND_URL=$(python3 - <<'PY'
          import json
          with open("cdk-frontend-outputs.json") as f:
              outputs = json.load(f)
          stack = outputs.get("CashlyticsFrontend-prod", {})
          url = next((v for v in stack.values() if v.startswith("https://")), "")
          print(url.rstrip("/"))
          PY
          )
          echo "url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"